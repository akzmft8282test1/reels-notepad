<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎬 릴스 대회 아이디어 & 대본 협업 스튜디오 Pro</title>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Quill.js 서식 에디터 -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
      :root {
        --primary: #e1306c;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --text: #333333;
        --border: #e0e0e0;
        --canvas-bg: #f8fafc;
        --grid-color: #cbd5e1;
      }

      body.dark-mode {
        --bg: #121212;
        --card-bg: #1e1e1e;
        --text: #e0e0e0;
        --border: #333333;
        --canvas-bg: #18181b;
        --grid-color: #3f3f46;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      header {
        background: var(--card-bg);
        border-bottom: 1px solid var(--border);
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        z-index: 100;
      }
      .logo {
        font-weight: bold;
        font-size: 1.2rem;
        color: var(--primary);
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .online-users {
        font-size: 0.85rem;
        background: rgba(0, 0, 0, 0.05);
        padding: 4px 10px;
        border-radius: 12px;
      }

      .kanban-container {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding-bottom: 20px;
        margin-top: 20px;
      }
      .kanban-col {
        flex: 1;
        min-width: 280px;
        background: rgba(0, 0, 0, 0.03);
        border-radius: 8px;
        padding: 12px;
        border: 1px dashed var(--border);
      }
      .kanban-col-title {
        font-weight: bold;
        margin-bottom: 10px;
      }

      .card {
        background: var(--card-bg);
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 14px;
        margin-bottom: 15px;
        position: relative;
        outline: none;
      }
      .card.selected,
      .canvas-card.selected {
        border: 2px solid var(--primary) !important;
        box-shadow: 0 0 12px rgba(225, 48, 108, 0.5);
      }
      .card.pinned {
        border: 2px solid var(--primary);
      }
      .badge {
        display: inline-block;
        padding: 2px 6px;
        font-size: 0.75rem;
        border-radius: 4px;
        background: #eee;
        color: #333;
        margin-right: 4px;
      }

      .script-box {
        background: rgba(0, 0, 0, 0.05);
        padding: 8px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.85rem;
        margin-top: 8px;
        white-space: pre-wrap;
      }

      #canvasView {
        display: none;
        width: 100vw;
        height: calc(100vh - 60px);
        overflow: hidden;
        position: relative;
      }
      #canvasContainer {
        width: 3000px;
        height: 3000px;
        background-color: var(--canvas-bg);
        background-image: radial-gradient(
          var(--grid-color) 1.5px,
          transparent 1.5px
        );
        background-size: 24px 24px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
      }
      #paintCanvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .canvas-card {
        position: absolute;
        min-width: 240px;
        background: var(--card-bg);
        color: var(--text);
        border-radius: 8px;
        border: 2px solid var(--border);
        padding: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 10;
        resize: both;
        overflow: auto;
        outline: none;
      }

      #contextMenu {
        display: none;
        position: fixed;
        background: var(--card-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        z-index: 9999;
        min-width: 160px;
        padding: 6px 0;
      }
      #contextMenu div {
        padding: 8px 14px;
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }
      #contextMenu div:hover {
        background: var(--primary);
        color: #fff;
      }

      .tool-btn.active {
        background: var(--primary) !important;
        color: white !important;
        font-weight: bold;
      }
      .resize-btn-on {
        background: #27ae60 !important;
        color: white !important;
        font-weight: bold;
      }

      .modal-bg {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: var(--card-bg);
        color: var(--text);
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 500px;
        max-height: 85vh;
        overflow-y: auto;
      }

      .sidebar {
        position: fixed;
        right: -300px;
        top: 0;
        width: 260px;
        height: 100%;
        background: var(--card-bg);
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
        z-index: 500;
        padding: 20px;
      }
      .sidebar.open {
        right: 0;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--card-bg);
        color: var(--text);
      }
      button {
        background: var(--primary);
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🎬 릴스 메모장 Pro</div>
      <div class="header-right">
        <button
          onclick="switchView('kanban')"
          style="width: auto; padding: 4px 8px; background: #4a90e2"
        >
          📋 칸반 뷰
        </button>
        <button
          onclick="switchView('canvas')"
          style="width: auto; padding: 4px 8px; background: #27ae60"
        >
          🎨 캔버스 뷰
        </button>
        <button
          onclick="toggleDarkMode()"
          style="width: auto; padding: 4px 8px"
        >
          🌙/☀️
        </button>
        <button
          onclick="openAuditLogsModal()"
          style="width: auto; padding: 4px 8px; background: #7f8c8d"
        >
          📜 활동로그
        </button>
        <button
          onclick="toggleTrashModal()"
          style="width: auto; padding: 4px 8px"
        >
          🗑️ 휴지통
        </button>
        <div id="onlineCount" class="online-users">접속자: 0명</div>
        <button
          onclick="toggleSidebar()"
          style="
            width: auto;
            background: none;
            color: var(--text);
            font-size: 1.4rem;
          "
        >
          ☰
        </button>
      </div>
    </header>

    <div id="sidebar" class="sidebar">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <h3>📌 게시판 목록</h3>
        <span style="cursor: pointer" onclick="toggleSidebar()">✕</span>
      </div>
      <ul id="boardList" style="list-style: none; padding: 0"></ul>
      <hr />
      <h4>+ 새 게시판 만들기</h4>
      <input type="text" id="newBoardName" placeholder="게시판 이름 입력" />
      <button onclick="createBoard()">게시판 생성</button>
      <button
        style="background: #e74c3c; margin-top: 10px"
        onclick="exportTXT()"
      >
        📄 전체 대본 TXT 내보내기
      </button>
      <button style="background: #666; margin-top: 10px" onclick="logout()">
        로그아웃
      </button>
    </div>

    <!-- 로그인 화면 -->
    <div
      id="loginView"
      style="max-width: 360px; margin: 80px auto; text-align: center"
    >
      <h2>🔐 접속하기</h2>
      <input type="text" id="username" placeholder="아이디" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button onclick="login()">로그인</button>
    </div>

    <!-- 1. 칸반 보드 뷰 -->
    <div
      id="kanbanView"
      class="container"
      style="
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 15px;
        display: none;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <h2 id="currentBoardTitle">기본 게시판</h2>

        <!-- 🎯 대본 유형별 작성 버튼 복원 -->
        <div style="display: flex; gap: 6px">
          <button
            style="width: auto; background: var(--primary)"
            onclick="openMemoModalWithType('hook')"
          >
            ⚡ 3초 후킹 노드
          </button>
          <button
            style="width: auto; background: #3b82f6"
            onclick="openMemoModalWithType('story')"
          >
            📖 스토리 노드
          </button>
          <button
            style="width: auto; background: #10b981"
            onclick="openMemoModalWithType('custom')"
          >
            + 자유 아이디어
          </button>
        </div>
      </div>

      <div class="kanban-container">
        <div
          class="kanban-col"
          ondragover="allowDrop(event)"
          ondrop="drop(event, '아이디어')"
        >
          <div class="kanban-col-title">💡 아이디어</div>
          <div id="col-아이디어"></div>
        </div>
        <div
          class="kanban-col"
          ondragover="allowDrop(event)"
          ondrop="drop(event, '대본작성')"
        >
          <div class="kanban-col-title">✍️ 대본작성</div>
          <div id="col-대본작성"></div>
        </div>
        <div
          class="kanban-col"
          ondragover="allowDrop(event)"
          ondrop="drop(event, '촬영예정')"
        >
          <div class="kanban-col-title">🎥 촬영예정</div>
          <div id="col-촬영예정"></div>
        </div>
        <div
          class="kanban-col"
          ondragover="allowDrop(event)"
          ondrop="drop(event, '완료')"
        >
          <div class="kanban-col-title">✅ 완료</div>
          <div id="col-완료"></div>
        </div>
      </div>
    </div>

    <!-- 2. 무한 캔버스 뷰 -->
    <div id="canvasView">
      <div
        style="
          position: absolute;
          top: 10px;
          left: 10px;
          z-index: 100;
          display: flex;
          gap: 6px;
          background: rgba(255, 255, 255, 0.95);
          padding: 6px;
          border-radius: 8px;
          border: 1px solid #ccc;
          color: #000;
        "
      >
        <button
          id="btnPan"
          class="tool-btn active"
          style="width: auto; padding: 4px 10px"
          onclick="setTool('pan')"
        >
          🖐️ 캔버스 이동
        </button>
        <button
          id="btnSelect"
          class="tool-btn"
          style="width: auto; padding: 4px 10px"
          onclick="setTool('select')"
        >
          ↖️ 선택/편집
        </button>
        <button
          id="btnPen"
          class="tool-btn"
          style="width: auto; padding: 4px 10px"
          onclick="setTool('pen')"
        >
          ✏️ 펜
        </button>
        <button
          id="btnEraser"
          class="tool-btn"
          style="width: auto; padding: 4px 10px"
          onclick="setTool('eraser')"
        >
          🧹 지우개
        </button>
        <input
          type="color"
          id="penColor"
          value="#e1306c"
          style="width: 28px; height: 24px; border: none; cursor: pointer"
        />

        <button
          id="btnResizeToggle"
          style="width: auto; padding: 4px 10px; background: #8e44ad"
          onclick="toggleAutoResize()"
        >
          ⚡ 캔버스 크기 늘리기: OFF 🔴
        </button>
        <span
          id="canvasSizeInfo"
          style="
            font-size: 0.75rem;
            align-self: center;
            font-family: monospace;
            margin-left: 4px;
            color: #555;
          "
          >3000x3000px</span
        >
        <button
          style="width: auto; padding: 4px 8px; background: #e74c3c"
          onclick="clearDrawings()"
        >
          그림 지우기
        </button>
      </div>
      <div id="canvasContainer">
        <canvas id="paintCanvas" width="3000" height="3000"></canvas>
      </div>
    </div>

    <!-- 우클릭 컨텍스트 메뉴 -->
    <div id="contextMenu">
      <div onclick="contextAction('cut')">
        <span>✂️ 잘라내기</span><small style="opacity: 0.6">Ctrl+X</small>
      </div>
      <div onclick="contextAction('copy')">
        <span>📋 대본 복사</span><small style="opacity: 0.6">Ctrl+C</small>
      </div>
      <div onclick="contextAction('paste')">
        <span>📥 대본 붙여넣기</span><small style="opacity: 0.6">Ctrl+V</small>
      </div>
      <div onclick="contextAction('delete')" style="color: #e74c3c">
        <span>🗑️ 삭제하기</span><small style="opacity: 0.6">Del</small>
      </div>
    </div>

    <!-- 메모 작성/수정 모달 -->
    <div id="memoModal" class="modal-bg">
      <div class="modal">
        <h3>📝 메모/대본 작성</h3>
        <input type="hidden" id="editMemoId" />
        <label>제목</label>
        <input type="text" id="editTitle" />

        <label>카테고리 (#태그)</label>
        <input type="text" id="editCategory" placeholder="예: #병맛, #챌린지" />

        <label>상태</label>
        <select id="editStatus">
          <option value="아이디어">💡 아이디어</option>
          <option value="대본작성">✍️ 대본작성</option>
          <option value="촬영예정">🎥 촬영예정</option>
          <option value="완료">✅ 완료</option>
        </select>

        <label>대본 (서식 편집 지원)</label>
        <div
          id="quillEditor"
          style="height: 140px; background: #fff; color: #000; margin-top: 6px"
        ></div>

        <div style="display: flex; gap: 10px; margin-top: 15px">
          <button onclick="saveMemoModal()">저장하기</button>
          <button style="background: #666" onclick="closeModal('memoModal')">
            취소
          </button>
        </div>
      </div>
    </div>

    <!-- 활동 로그 모달 -->
    <div id="auditLogModal" class="modal-bg">
      <div class="modal">
        <h3>📜 시스템 활동 로그 (Audit Log)</h3>
        <div
          id="auditLogModalBox"
          style="
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
          "
        ></div>
        <button
          style="background: #666; margin-top: 10px"
          onclick="closeModal('auditLogModal')"
        >
          닫기
        </button>
      </div>
    </div>

    <script>
      const socket = io();
      let currentUser = null;
      let currentBoardId = null;
      let activeSelectedMemoId = null;
      let clipboardData = null;
      let quill = null;
      let activeView = "kanban";
      let currentTool = "pan";
      let memosCache = {};

      let canvasWidth =
        parseInt(localStorage.getItem("savedCanvasWidth")) || 3000;
      let canvasHeight =
        parseInt(localStorage.getItem("savedCanvasHeight")) || 3000;
      let isAutoResizing = false;
      let resizeTimer = null;

      let pCanvas = null;
      let ctx = null;
      let isDrawing = false;
      let lastX = 0,
        lastY = 0;

      let isPanning = false;
      let panStart = { x: 0, y: 0 };
      let canvasPos = { x: 0, y: 0 };

      window.onload = () => {
        quill = new Quill("#quillEditor", { theme: "snow" });

        pCanvas = document.getElementById("paintCanvas");
        ctx = pCanvas.getContext("2d");

        applyCanvasSize(canvasWidth, canvasHeight);

        pCanvas.addEventListener("mousedown", (e) => {
          if (currentTool !== "pen" && currentTool !== "eraser") return;
          isDrawing = true;
          const rect = pCanvas.getBoundingClientRect();
          lastX = e.clientX - rect.left;
          lastY = e.clientY - rect.top;
        });

        pCanvas.addEventListener("mousemove", (e) => {
          if (!isDrawing) return;
          const rect = pCanvas.getBoundingClientRect();
          const currentX = e.clientX - rect.left;
          const currentY = e.clientY - rect.top;

          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(currentX, currentY);

          if (currentTool === "eraser") {
            ctx.globalCompositeOperation = "destination-out";
            ctx.lineWidth = 25;
            ctx.lineCap = "round";
            ctx.stroke();
          } else if (currentTool === "pen") {
            ctx.globalCompositeOperation = "source-over";
            ctx.strokeStyle = document.getElementById("penColor").value;
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.stroke();
          }

          socket.emit("drawing:stroke", {
            boardId: currentBoardId,
            strokeData: {
              tool: currentTool,
              x1: lastX,
              y1: lastY,
              x2: currentX,
              y2: currentY,
              color: document.getElementById("penColor").value,
            },
          });

          lastX = currentX;
          lastY = currentY;
        });

        window.addEventListener("mouseup", () => {
          isDrawing = false;
        });

        const canvasView = document.getElementById("canvasView");
        const container = document.getElementById("canvasContainer");

        canvasView.addEventListener("mousedown", (e) => {
          if (currentTool === "pan" && !e.target.closest(".canvas-card")) {
            isPanning = true;
            panStart = {
              x: e.clientX - canvasPos.x,
              y: e.clientY - canvasPos.y,
            };
            canvasView.style.cursor = "grabbing";
          }
        });

        window.addEventListener("mousemove", (e) => {
          if (isPanning) {
            canvasPos.x = e.clientX - panStart.x;
            canvasPos.y = e.clientY - panStart.y;
            container.style.transform = `translate(${canvasPos.x}px, ${canvasPos.y}px)`;
          }
        });

        window.addEventListener("mouseup", () => {
          if (isPanning) {
            isPanning = false;
            if (currentTool === "pan") canvasView.style.cursor = "grab";
          }
        });

        window.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          const cardEl = e.target.closest(".card, .canvas-card");
          const contextMenu = document.getElementById("contextMenu");

          if (cardEl) {
            activeSelectedMemoId =
              cardEl.dataset.id || cardEl.id.replace("card-", "");
            highlightSelectedCard(activeSelectedMemoId);
          }

          contextMenu.style.left = `${e.clientX}px`;
          contextMenu.style.top = `${e.clientY}px`;
          contextMenu.style.display = "block";
        });

        window.addEventListener("click", () => {
          document.getElementById("contextMenu").style.display = "none";
        });

        window.addEventListener("keydown", (e) => {
          const activeTag = document.activeElement
            ? document.activeElement.tagName.toLowerCase()
            : "";
          const isEditingText =
            activeTag === "input" ||
            activeTag === "textarea" ||
            document.activeElement.classList.contains("ql-editor");

          if (isEditingText) return;

          if (
            (e.key === "Delete" || e.key === "Backspace") &&
            activeSelectedMemoId
          ) {
            e.preventDefault();
            deleteMemo(activeSelectedMemoId);
            activeSelectedMemoId = null;
          }
        });

        init();
      };

      function toggleAutoResize() {
        isAutoResizing = !isAutoResizing;
        const btn = document.getElementById("btnResizeToggle");

        if (isAutoResizing) {
          btn.classList.add("resize-btn-on");
          btn.innerText = "⚡ 캔버스 크기 늘리기: ON 🟢 (클릭 시 멈춤)";

          resizeTimer = setInterval(() => {
            canvasWidth += 1000;
            canvasHeight += 1000;
            applyCanvasSize(canvasWidth, canvasHeight);
            saveCanvasSize(canvasWidth, canvasHeight);
          }, 1000);
        } else {
          btn.classList.remove("resize-btn-on");
          btn.innerText = "⚡ 캔버스 크기 늘리기: OFF 🔴";
          if (resizeTimer) clearInterval(resizeTimer);
          saveCanvasSize(canvasWidth, canvasHeight);
        }
      }

      function applyCanvasSize(w, h) {
        const container = document.getElementById("canvasContainer");
        container.style.width = `${w}px`;
        container.style.height = `${h}px`;

        if (pCanvas) {
          const imgData = ctx.getImageData(0, 0, pCanvas.width, pCanvas.height);
          pCanvas.width = w;
          pCanvas.height = h;
          ctx.putImageData(imgData, 0, 0);
        }
        document.getElementById("canvasSizeInfo").innerText = `${w}x${h}px`;
      }

      function saveCanvasSize(w, h) {
        localStorage.setItem("savedCanvasWidth", w);
        localStorage.setItem("savedCanvasHeight", h);
        if (currentBoardId) {
          fetch("/api/boards/size", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              boardId: currentBoardId,
              width: w,
              height: h,
            }),
          });
        }
      }

      async function init() {
        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.loggedIn) {
          currentUser = data.user;
          document.getElementById("loginView").style.display = "none";
          switchView("kanban");
          loadBoards();
        }
      }

      function setTool(tool) {
        currentTool = tool;
        document
          .querySelectorAll(".tool-btn")
          .forEach((btn) => btn.classList.remove("active"));
        const canvasView = document.getElementById("canvasView");

        if (tool === "pan") {
          document.getElementById("btnPan").classList.add("active");
          canvasView.style.cursor = "grab";
        } else if (tool === "select") {
          document.getElementById("btnSelect").classList.add("active");
          canvasView.style.cursor = "default";
        } else if (tool === "pen") {
          document.getElementById("btnPen").classList.add("active");
          canvasView.style.cursor = "crosshair";
        } else if (tool === "eraser") {
          document.getElementById("btnEraser").classList.add("active");
          canvasView.style.cursor = "cell";
        }
      }

      function highlightSelectedCard(memoId) {
        document
          .querySelectorAll(".card, .canvas-card")
          .forEach((el) => el.classList.remove("selected"));
        const target = document.querySelector(
          `.card[data-id="${memoId}"], #card-${memoId}`,
        );
        if (target) target.classList.add("selected");
      }

      function contextAction(type) {
        if (type === "copy" && activeSelectedMemoId) {
          clipboardData = memosCache[activeSelectedMemoId];
          alert("대본이 복사되었습니다.");
        } else if (type === "cut" && activeSelectedMemoId) {
          clipboardData = memosCache[activeSelectedMemoId];
          deleteMemo(activeSelectedMemoId);
          activeSelectedMemoId = null;
          alert("대본이 잘라내기 처리 되었습니다.");
        } else if (type === "paste") {
          if (!clipboardData) return alert("복사된 대본이 없습니다.");
          socket.emit("memo:save", {
            board_id: currentBoardId,
            title: `${clipboardData.title} (복사본)`,
            category: clipboardData.category,
            status: clipboardData.status,
            script: clipboardData.script,
            rich_content: clipboardData.rich_content,
            author: currentUser.name,
          });
        } else if (type === "delete" && activeSelectedMemoId) {
          deleteMemo(activeSelectedMemoId);
          activeSelectedMemoId = null;
        }
      }

      async function createBoard() {
        const nameInput = document.getElementById("newBoardName");
        const name = nameInput.value.trim();
        if (!name) return alert("게시판 이름을 입력해 주세요.");

        const res = await fetch("/api/boards", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name }),
        });

        if (res.ok) {
          nameInput.value = "";
          alert("새 게시판이 생성되었습니다!");
          loadBoards();
        }
      }

      // 🎯 [게시판 삭제 기능] Admin / 관리자 삭제 및 프론트엔드 연동
      async function deleteBoard(boardId, boardName) {
        if (
          !confirm(
            `정말로 [${boardName}] 게시판과 내부 모든 메모를 삭제하시겠습니까?`,
          )
        )
          return;

        const res = await fetch(`/api/boards/${boardId}`, { method: "DELETE" });
        const data = await res.json();

        if (data.success) {
          alert("게시판이 성공적으로 삭제되었습니다.");
          currentBoardId = null;
          loadBoards();
        } else {
          alert(data.message || "삭제 실패");
        }
      }

      function switchView(view) {
        activeView = view;
        if (view === "kanban") {
          document.getElementById("kanbanView").style.display = "block";
          document.getElementById("canvasView").style.display = "none";
        } else {
          document.getElementById("kanbanView").style.display = "none";
          document.getElementById("canvasView").style.display = "block";
          setTool("pan");
        }
        if (currentBoardId) loadMemos();
      }

      function clearDrawings() {
        if (confirm("모든 그림을 지우시겠습니까?")) {
          ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
          socket.emit("drawing:clear", currentBoardId);
        }
      }

      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) location.reload();
        else alert(data.message);
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" });
        location.reload();
      }
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
      }
      function closeModal(id) {
        document.getElementById(id).style.display = "none";
      }

      async function loadBoards() {
        const res = await fetch("/api/boards");
        const boards = await res.json();
        const listEl = document.getElementById("boardList");
        listEl.innerHTML = "";

        boards.forEach((board, idx) => {
          const li = document.createElement("li");
          li.style.display = "flex";
          li.style.justifyContent = "space-between";
          li.style.alignItems = "center";
          li.style.padding = "6px 8px";

          li.innerHTML = `
            <span style="cursor:pointer; flex:1;" onclick="selectBoardById('${board.id}', '${board.name}')">${board.name}</span>
            ${
              currentUser?.role === "Admin" || currentUser?.role === "Member"
                ? `
              <button style="width:auto; padding:2px 6px; background:#e74c3c; font-size:0.75rem;" onclick="deleteBoard('${board.id}', '${board.name}')">🗑️</button>
            `
                : ""
            }
          `;

          if ((idx === 0 && !currentBoardId) || currentBoardId === board.id) {
            selectBoard(board);
          }
          listEl.appendChild(li);
        });
      }

      function selectBoardById(id, name) {
        selectBoard({ id, name });
      }

      function selectBoard(board) {
        currentBoardId = board.id;
        document.getElementById("currentBoardTitle").innerText = board.name;

        if (board.canvas_width && board.canvas_height) {
          canvasWidth = board.canvas_width;
          canvasHeight = board.canvas_height;
          applyCanvasSize(canvasWidth, canvasHeight);
        }

        socket.emit("board:join", board.id);
        loadMemos();
      }

      async function loadMemos() {
        if (!currentBoardId) return;
        const res = await fetch(`/api/memos/${currentBoardId}`);
        const memos = await res.json();
        if (activeView === "kanban") renderKanban(memos);
        else renderCanvas(memos);
      }

      function renderKanban(memos) {
        ["아이디어", "대본작성", "촬영예정", "완료"].forEach((status) => {
          document.getElementById(`col-${status}`).innerHTML = "";
        });

        memos.forEach((memo) => {
          memosCache[memo.id] = memo;
          const colEl =
            document.getElementById(`col-${memo.status}`) ||
            document.getElementById("col-아이디어");

          const card = document.createElement("div");
          card.className = `card ${memo.is_pinned ? "pinned" : ""}`;
          card.dataset.id = memo.id;
          card.tabIndex = 0;
          card.onclick = () => {
            activeSelectedMemoId = memo.id;
            highlightSelectedCard(memo.id);
          };

          card.innerHTML = `
            <span class="badge">${memo.category || "일반"}</span>
            <h4 style="margin:6px 0;">${memo.title}</h4>
            <div class="script-box">${memo.rich_content || memo.script || "대본 없음"}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:0.75rem; color:#888;">
              <span>✍️ ${memo.author}</span>
              <button style="width:auto; padding:2px 6px; background:#e74c3c;" onclick="deleteMemo('${memo.id}')">🗑️</button>
            </div>
          `;
          colEl.appendChild(card);
        });
      }

      function renderCanvas(memos) {
        const container = document.getElementById("canvasContainer");
        container.querySelectorAll(".canvas-card").forEach((c) => c.remove());

        memos.forEach((memo, index) => {
          memosCache[memo.id] = memo;
          const card = document.createElement("div");
          card.className = "canvas-card";
          card.dataset.id = memo.id;
          card.id = `card-${memo.id}`;
          card.tabIndex = 0;
          card.style.left = `${memo.pos_x || 100 + (index % 4) * 320}px`;
          card.style.top = `${memo.pos_y || 100 + Math.floor(index / 4) * 260}px`;

          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="badge">${memo.category || "#아이디어"}</span>
              <span style="font-size:0.7rem;">✍️ ${memo.author}</span>
            </div>
            <h4 style="margin:4px 0;">${memo.title}</h4>
            <div class="script-box" style="max-height:80px;">${memo.rich_content || memo.script || ""}</div>
          `;

          card.onclick = () => {
            activeSelectedMemoId = memo.id;
            highlightSelectedCard(memo.id);
          };

          let isDraggingCard = false,
            offsetLeft = 0,
            offsetTop = 0;
          card.addEventListener("mousedown", (e) => {
            if (currentTool !== "select") return;
            isDraggingCard = true;
            offsetLeft = e.clientX - card.offsetLeft;
            offsetTop = e.clientY - card.offsetTop;
          });

          window.addEventListener("mousemove", (e) => {
            if (isDraggingCard && currentTool === "select") {
              const newX = e.clientX - offsetLeft;
              const newY = e.clientY - offsetTop;
              card.style.left = `${newX}px`;
              card.style.top = `${newY}px`;
              socket.emit("memo:move", {
                memoId: memo.id,
                boardId: currentBoardId,
                pos_x: newX,
                pos_y: newY,
              });
            }
          });

          window.addEventListener("mouseup", () => {
            isDraggingCard = false;
          });
          container.appendChild(card);
        });
      }

      // 🎯 대본 유형별 모달 오픈 함수 복원
      function openMemoModalWithType(type) {
        document.getElementById("editMemoId").value = "";

        if (type === "hook") {
          document.getElementById("editTitle").value = "⚡ 3초 후킹 대본 노드";
          document.getElementById("editCategory").value = "#후킹";
          quill.clipboard.dangerouslyPasteHTML(
            "<p><strong style='color:rgb(225,48,108);'>[3초 후킹]</strong>: 아직도 ~하시나요?</p><p>[본문]: </p>",
          );
        } else if (type === "story") {
          document.getElementById("editTitle").value = "📖 스토리텔링 노드";
          document.getElementById("editCategory").value = "#스토리";
          quill.clipboard.dangerouslyPasteHTML(
            "<p><strong>[도입]</strong>: 완벽한 대본을 작성해보세요.</p><p>[전개]: </p>",
          );
        } else {
          document.getElementById("editTitle").value = "💡 자유 아이디어 노드";
          document.getElementById("editCategory").value = "#아이디어";
          quill.clipboard.dangerouslyPasteHTML("<p>[아이디어 설명]: </p>");
        }

        document.getElementById("memoModal").style.display = "flex";
      }

      function saveMemoModal() {
        const memoData = {
          board_id: currentBoardId,
          title: document.getElementById("editTitle").value || "무제 아이디어",
          category: document.getElementById("editCategory").value || "#일반",
          status: document.getElementById("editStatus").value,
          rich_content: quill.root.innerHTML,
          script: quill.getText(),
          author: currentUser.name,
        };
        socket.emit("memo:save", memoData);
        closeModal("memoModal");
      }

      function deleteMemo(memoId) {
        if (confirm("이 메모를 삭제하시겠습니까?")) {
          socket.emit("memo:delete", { memoId, boardId: currentBoardId });
        }
      }

      socket.on("board:deleted", () => loadBoards());
      socket.on("memo:updated", () => loadMemos());
      socket.on("drawing:stroke", (s) => {
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        if (s.tool === "eraser") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.lineWidth = 25;
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = s.color;
          ctx.lineWidth = 4;
        }
        ctx.lineCap = "round";
        ctx.stroke();
      });
      socket.on("drawing:cleared", () =>
        ctx.clearRect(0, 0, pCanvas.width, pCanvas.height),
      );
      socket.on("canvas:resized", ({ width, height }) =>
        applyCanvasSize(width, height),
      );
    </script>
  </body>
</html>
