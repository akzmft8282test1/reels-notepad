<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎨 피그마형 무한 릴스 대본 캔버스 Pro</title>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Quill.js 서식 있는 텍스트 에디터 -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
      :root {
        --primary: #e1306c;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --text: #333333;
        --border: #e0e0e0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: #e2e8f0;
        overflow: hidden;
      }

      /* 상단 피그마 스타일 툴바 */
      header {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        padding: 8px 24px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        z-index: 1000;
      }

      /* 거대한 무한 모눈격자 캔버스 */
      #canvas {
        width: 6000px;
        height: 6000px;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* 캔버스 자율 배치 카드 */
      .canvas-card {
        position: absolute;
        width: 320px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 2px solid #cbd5e1;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 16px;
        cursor: move;
        user-select: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .canvas-card:hover {
        border-color: var(--primary);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      }

      .script-box {
        background: #f1f5f9;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        font-size: 0.85rem;
        margin-top: 8px;
        max-height: 160px;
        overflow-y: auto;
      }

      /* 타 유저 마우스 커서 */
      .user-cursor {
        position: absolute;
        pointer-events: none;
        font-size: 11px;
        padding: 3px 8px;
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        z-index: 9999;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .modal-bg {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        max-width: 580px;
      }

      input,
      button,
      select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
      }
      button.btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }

      #adminConsole {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 420px;
        background: #1e1e1e;
        color: #00ff66;
        padding: 20px;
        border-radius: 10px;
        z-index: 3000;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <div
        style="
          font-weight: bold;
          color: var(--primary);
          display: flex;
          align-items: center;
          gap: 6px;
        ">
        🎨 릴스 캔버스 Pro
      </div>
      <button class="btn-primary" onclick="openMemoModal('hook')">
        ⚡ 3초 후킹 노드
      </button>
      <button
        class="btn-primary"
        style="background: #3b82f6"
        onclick="openMemoModal('story')">
        📖 스토리 노드
      </button>
      <button
        class="btn-primary"
        style="background: #10b981"
        onclick="openMemoModal('custom')">
        + 자유 아이디어
      </button>
      <button
        style="background: #64748b; color: #fff"
        onclick="toggleTrashModal()">
        🗑️ 휴지통
      </button>
      <div
        id="onlineCount"
        style="
          font-size: 0.85rem;
          background: #f1f5f9;
          padding: 4px 10px;
          border-radius: 12px;
        ">
        접속자: 0명
      </div>
      <button style="background: #e74c3c; color: #fff" onclick="logout()">
        로그아웃
      </button>
    </header>

    <!-- 로그인 화면 -->
    <div
      id="loginView"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        z-index: 3000;
        text-align: center;
      ">
      <h2>🔐 릴스 캔버스 접속</h2>
      <input
        type="text"
        id="username"
        placeholder="아이디"
        style="width: 100%; margin-bottom: 10px" /><br />
      <input
        type="password"
        id="password"
        placeholder="비밀번호"
        style="width: 100%; margin-bottom: 10px" /><br />
      <button class="btn-primary" style="width: 100%" onclick="login()">
        접속하기
      </button>
    </div>

    <!-- 무한 캔버스 -->
    <div id="canvas"></div>

    <!-- 작성 및 서식 편집 모달 -->
    <div id="memoModal" class="modal-bg">
      <div class="modal">
        <h3>📝 캔버스 메모 노드 편집</h3>
        <input type="hidden" id="editMemoId" />
        <label>제목</label>
        <input
          type="text"
          id="editTitle"
          style="width: 100%; margin-bottom: 10px" />

        <label>카테고리</label>
        <input
          type="text"
          id="editCategory"
          placeholder="#정보, #챌린지"
          style="width: 100%; margin-bottom: 10px" />

        <label>대본 서식 (볼드, 이탤릭, 색상 적용)</label>
        <div
          id="quillEditor"
          style="height: 150px; background: #fff; margin-bottom: 10px"></div>

        <div style="display: flex; gap: 10px; margin-top: 15px">
          <button class="btn-primary" style="flex: 1" onclick="saveMemoModal()">
            캔버스에 저장
          </button>
          <button
            style="
              background: #666;
              color: #fff;
              border: none;
              border-radius: 6px;
              padding: 8px 15px;
              cursor: pointer;
            "
            onclick="closeModal('memoModal')">
            취소
          </button>
        </div>
      </div>
    </div>

    <!-- 댓글 모달 -->
    <div id="commentModal" class="modal-bg">
      <div class="modal">
        <h3>💬 아이디어 토론 댓글</h3>
        <div
          id="commentList"
          style="
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            padding: 8px;
            border-radius: 6px;
          "></div>
        <textarea
          id="newCommentText"
          placeholder="댓글 입력 (@닉네임 으로 멘션 가능)"
          rows="2"
          style="width: 100%"></textarea>
        <button class="btn-primary" onclick="submitComment()">댓글 작성</button>
        <button
          style="background: #666; color: #fff; margin-top: 5px; width: 100%"
          onclick="closeModal('commentModal')">
          닫기
        </button>
      </div>
    </div>

    <!-- 휴지통 모달 -->
    <div id="trashModal" class="modal-bg">
      <div class="modal">
        <h3>🗑️ 휴지통 (60일간 보관)</h3>
        <div id="trashList" style="max-height: 250px; overflow-y: auto"></div>
        <button
          style="background: #666; color: #fff; margin-top: 10px; width: 100%"
          onclick="closeModal('trashModal')">
          닫기
        </button>
      </div>
    </div>

    <!-- 어드민 콘솔 -->
    <div id="adminConsole">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        ">
        <h3 style="margin: 0">⚡ ADMIN CONSOLE</h3>
        <span style="cursor: pointer" onclick="closeAdminConsole()">✕</span>
      </div>
      <p style="font-size: 0.8rem">신규 팀원 생성 및 접속 로그 확인</p>
      <input
        type="text"
        id="adminNewName"
        placeholder="닉네임"
        style="width: 100%; margin-bottom: 5px" />
      <input
        type="text"
        id="adminNewUsername"
        placeholder="아이디"
        style="width: 100%; margin-bottom: 5px" />
      <input
        type="password"
        id="adminNewPassword"
        placeholder="비밀번호"
        style="width: 100%; margin-bottom: 5px" />
      <select id="adminNewRole" style="width: 100%; margin-bottom: 10px">
        <option value="Member">Member (수정/생성 가능)</option>
        <option value="Admin">Admin (관리자)</option>
        <option value="Viewer">Viewer (읽기 전용)</option>
      </select>
      <button class="btn-primary" style="width: 100%" onclick="addNewUser()">
        계정 추가하기
      </button>
    </div>

    <script>
      const socket = io();
      let currentUser = null;
      let currentBoardId = null;
      let quill = null;
      let memosCache = {};
      let selectedMemoForComment = null;
      let isDragging = false;
      let dragTarget = null;
      let dragOffset = { x: 0, y: 0 };

      // 피그마 실시간 마우스 위치 및 드래그 제어
      document.addEventListener("mousemove", (e) => {
        socket.emit("cursor:move", { x: e.clientX, y: e.clientY });

        if (isDragging && dragTarget) {
          const newX = e.clientX - dragOffset.x;
          const newY = e.clientY - dragOffset.y;

          dragTarget.style.left = `${newX}px`;
          dragTarget.style.top = `${newY}px`;

          socket.emit("memo:move", {
            memoId: dragTarget.dataset.id,
            boardId: currentBoardId,
            pos_x: newX,
            pos_y: newY,
          });
        }
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        dragTarget = null;
      });

      socket.on("cursor:update", (data) => {
        let cursorEl = document.getElementById(`cursor-${data.socketId}`);
        if (!cursorEl) {
          cursorEl = document.createElement("div");
          cursorEl.id = `cursor-${data.socketId}`;
          cursorEl.className = "user-cursor";
          document.body.appendChild(cursorEl);
        }
        cursorEl.innerText = `🖱️ ${data.name}`;
        cursorEl.style.left = `${data.x + 10}px`;
        cursorEl.style.top = `${data.y + 10}px`;
      });

      socket.on("cursor:remove", (socketId) => {
        const cursorEl = document.getElementById(`cursor-${socketId}`);
        if (cursorEl) cursorEl.remove();
      });

      socket.on("memo:moved", ({ memoId, pos_x, pos_y }) => {
        const card = document.getElementById(`card-${memoId}`);
        if (card) {
          card.style.left = `${pos_x}px`;
          card.style.top = `${pos_y}px`;
        }
      });

      async function init() {
        quill = new Quill("#quillEditor", {
          theme: "snow",
          modules: {
            toolbar: [
              ["bold", "italic", "underline"],
              [{ color: [] }, { background: [] }],
            ],
          },
        });

        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.loggedIn) {
          currentUser = data.user;
          document.getElementById("loginView").style.display = "none";
          loadBoards();
        }
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) location.reload();
        else alert(data.message);
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" });
        location.reload();
      }

      async function loadBoards() {
        const res = await fetch("/api/boards");
        const boards = await res.json();
        if (boards.length > 0) {
          currentBoardId = boards[0].id;
          socket.emit("board:join", currentBoardId);
          loadMemos();
        }
      }

      async function loadMemos() {
        const res = await fetch(`/api/memos/${currentBoardId}`);
        const memos = await res.json();
        renderCanvas(memos);
      }

      // 🎯 피그마 무한 캔버스 렌더링
      function renderCanvas(memos) {
        memosCache = {};
        const canvas = document.getElementById("canvas");
        canvas.innerHTML = "";

        memos.forEach((memo, index) => {
          memosCache[memo.id] = memo;
          const card = document.createElement("div");
          card.className = "canvas-card";
          card.id = `card-${memo.id}`;
          card.dataset.id = memo.id;

          const posX = memo.pos_x || 120 + (index % 4) * 350;
          const posY = memo.pos_y || 120 + Math.floor(index / 4) * 300;

          card.style.left = `${posX}px`;
          card.style.top = `${posY}px`;

          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <span style="font-size:0.75rem; background:#ffe6ed; color:var(--primary); padding:2px 6px; border-radius:4px; font-weight:bold;">${memo.category || "#아이디어"}</span>
              <span style="font-size:0.75rem; color:#888;">✍️ ${memo.author}</span>
            </div>
            <h4 style="margin:4px 0;">${memo.title}</h4>
            <div class="script-box">${memo.rich_content || memo.script || "내용 없음"}</div>

            <div style="display:flex; gap:4px; margin-top:10px;">
              <button style="font-size:0.7rem; padding:2px 6px; background:#4a90e2;" onclick="openCommentModal('${memo.id}')">💬 댓글</button>
              <button style="font-size:0.7rem; padding:2px 6px; background:#27ae60;" onclick="editMemo('${memo.id}')">✏️ 수정</button>
              <button style="font-size:0.7rem; padding:2px 6px; background:#e74c3c;" onclick="deleteMemo('${memo.id}')">🗑️</button>
            </div>
          `;

          card.addEventListener("mousedown", (e) => {
            if (e.target.tagName === "BUTTON" || e.target.tagName === "A")
              return;
            isDragging = true;
            dragTarget = card;
            dragOffset.x = e.clientX - card.offsetLeft;
            dragOffset.y = e.clientY - card.offsetTop;
          });

          canvas.appendChild(card);
        });
      }

      function openMemoModal(type) {
        document.getElementById("editMemoId").value = "";
        document.getElementById("editTitle").value =
          type === "hook" ? "⚡ 3초 후킹 대본" : "📖 스토리텔링 대본";
        document.getElementById("editCategory").value =
          type === "hook" ? "#후킹" : "#스토리";

        const defaultText =
          type === "hook"
            ? '<p><strong style="color:rgb(225,48,108);">[3초 후킹]</strong>: 아직도 ~하시나요?</p>'
            : "<p><strong>[도입]</strong>: 완벽한 대본을 작성해보세요.</p>";

        quill.clipboard.dangerouslyPasteHTML(defaultText);
        document.getElementById("memoModal").style.display = "flex";
      }

      function editMemo(memoId) {
        const memo = memosCache[memoId];
        if (!memo) return;

        document.getElementById("editMemoId").value = memo.id;
        document.getElementById("editTitle").value = memo.title;
        document.getElementById("editCategory").value = memo.category || "";
        quill.clipboard.dangerouslyPasteHTML(
          memo.rich_content || memo.script || "",
        );
        document.getElementById("memoModal").style.display = "flex";
      }

      function saveMemoModal() {
        const id = document.getElementById("editMemoId").value;
        socket.emit("memo:save", {
          id: id || undefined,
          board_id: currentBoardId,
          title: document.getElementById("editTitle").value || "무제 노드",
          category: document.getElementById("editCategory").value || "#일반",
          rich_content: quill.root.innerHTML,
          script: quill.getText(),
          pos_x: Math.floor(Math.random() * 300) + 100,
          pos_y: Math.floor(Math.random() * 300) + 150,
          author: currentUser.name,
        });
        closeModal("memoModal");
      }

      async function openCommentModal(memoId) {
        selectedMemoForComment = memoId;
        const res = await fetch(`/api/comments/${memoId}`);
        const comments = await res.json();
        const box = document.getElementById("commentList");
        box.innerHTML = comments
          .map(
            (c) => `
          <div style="font-size:0.8rem; margin-bottom:6px;">
            <b>${c.author}:</b> ${c.content}
          </div>
        `,
          )
          .join("");
        document.getElementById("commentModal").style.display = "flex";
      }

      function submitComment() {
        const text = document.getElementById("newCommentText").value;
        if (!text) return;
        socket.emit("comment:add", {
          memoId: selectedMemoForComment,
          boardId: currentBoardId,
          content: text,
        });
        document.getElementById("newCommentText").value = "";
        closeModal("commentModal");
      }

      async function toggleTrashModal() {
        const res = await fetch(`/api/trash/${currentBoardId}`);
        const trashMemos = await res.json();
        const box = document.getElementById("trashList");
        box.innerHTML = trashMemos
          .map(
            (t) => `
          <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; margin-bottom:6px;">
            <span>${t.title}</span>
            <button style="width:auto; padding:2px 6px;" onclick="restoreMemo('${t.id}')">복구</button>
          </div>
        `,
          )
          .join("");
        document.getElementById("trashModal").style.display = "flex";
      }

      async function restoreMemo(memoId) {
        await fetch("/api/memos/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ memoId }),
        });
        closeModal("trashModal");
        loadMemos();
      }

      function deleteMemo(memoId) {
        if (confirm("이 메모를 휴지통으로 이동하시겠습니까?")) {
          socket.emit("memo:delete", { memoId, boardId: currentBoardId });
        }
      }

      function closeModal(id) {
        document.getElementById(id).style.display = "none";
      }

      const secretSequence = [
        "ArrowUp",
        "ArrowDown",
        "ArrowUp",
        "ArrowLeft",
        "ArrowUp",
        "ArrowRight",
        "ArrowUp",
      ];
      let inputBuffer = [];

      document.addEventListener("keydown", (e) => {
        if (window.location.pathname !== "/admin") return;
        inputBuffer.push(e.key);
        if (inputBuffer.length > secretSequence.length) inputBuffer.shift();
        if (JSON.stringify(inputBuffer) === JSON.stringify(secretSequence)) {
          document.getElementById("adminConsole").style.display = "block";
          inputBuffer = [];
        }
      });

      function closeAdminConsole() {
        document.getElementById("adminConsole").style.display = "none";
      }

      async function addNewUser() {
        const name = document.getElementById("adminNewName").value;
        const username = document.getElementById("adminNewUsername").value;
        const password = document.getElementById("adminNewPassword").value;
        const role = document.getElementById("adminNewRole").value;

        const res = await fetch("/api/admin/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, username, password, role }),
        });
        const data = await res.json();
        if (data.success) alert("계정이 생성되었습니다!");
        else alert(data.message);
      }

      socket.on("presence:update", (users) => {
        document.getElementById("onlineCount").innerText =
          `접속자: ${users.length}명`;
      });

      socket.on("memo:updated", () => loadMemos());

      init();
    </script>
  </body>
</html>
