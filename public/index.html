<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🎨 피그마 캔버스 Ultimate (TOP 10 풀버전)</title>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Quill.js 서식 에디터 -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- Fabric.js 초고속 캔버스 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
      :root {
        --primary: #e1306c;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --border: #cbd5e1;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: #e2e8f0;
        overflow: hidden;
        user-select: none;
      }

      header {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ffffff;
        border: 1px solid var(--border);
        padding: 6px 16px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        z-index: 1000;
      }

      /* 뷰포트 & 캔버스 줌/팬 처리 */
      #canvasViewport {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
        cursor: grab;
      }

      #canvasContainer {
        width: 6000px;
        height: 6000px;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
      }

      /* 1번 기능: 연결선 SVG 레이어 */
      #connectionsSvg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .canvas-container {
        position: absolute !important;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* 5번 기능: 카드 크기 자유 리사이즈 */
      .canvas-card {
        position: absolute;
        min-width: 200px;
        min-height: 120px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 2px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 14px;
        cursor: move;
        z-index: 10;
        resize: both;
        overflow: auto;
        box-sizing: border-box;
      }

      /* 8번 기능: 카드 잠금 상태 */
      .canvas-card.locked {
        border-color: #ef4444;
        background: #fef2f2;
        cursor: not-allowed;
      }

      /* 6번 기능: 포스트잇 스티커 테마 */
      .canvas-card.sticky-note {
        background: #fef08a;
        border-color: #fde047;
      }

      .script-box {
        background: rgba(255, 255, 255, 0.7);
        padding: 8px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-top: 6px;
        max-height: 100px;
        overflow-y: auto;
      }

      /* 2번 기능: 미니맵 파트 */
      #minimap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 160px;
        height: 160px;
        background: #fff;
        border: 2px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        overflow: hidden;
      }
      #minimapViewport {
        position: absolute;
        border: 1.5px solid var(--primary);
        background: rgba(225, 48, 108, 0.1);
        cursor: pointer;
      }

      /* 10번 기능: 프롬프터 전용 모달 */
      #prompterOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        color: #fff;
        z-index: 5000;
        padding: 40px;
        box-sizing: border-box;
      }
      #prompterContent {
        font-size: 2.5rem;
        line-height: 1.8;
        font-weight: bold;
        text-align: center;
        white-space: pre-wrap;
      }

      .btn-tool {
        padding: 5px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #fff;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: bold;
      }
      .btn-tool.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .modal-bg {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
      }
    </style>
  </head>
  <body>
    <header>
      <div style="font-weight: bold; color: var(--primary); font-size: 0.9rem">
        🎨 캔버스 Ultimate
      </div>

      <button
        id="toolSelectBtn"
        class="btn-tool active"
        onclick="setTool('select')">
        🖐️ 선택
      </button>
      <button id="toolPenBtn" class="btn-tool" onclick="setTool('pen')">
        ✏️ 펜
      </button>
      <button id="toolEraserBtn" class="btn-tool" onclick="setTool('eraser')">
        🧹 지우개
      </button>

      <input
        type="color"
        id="penColor"
        value="#e1306c"
        style="width: 28px; height: 24px; border: none; cursor: pointer"
        onchange="updatePenColor()" />

      <!-- 6번 기능: 포스트잇/템플릿 추가 -->
      <button
        class="btn-tool"
        style="background: #fef08a"
        onclick="openMemoModal('sticky')">
        🟨 포스트잇
      </button>
      <button
        class="btn-tool"
        style="background: var(--primary); color: #fff"
        onclick="openMemoModal('normal')">
        + 대본카드
      </button>

      <!-- 10번 기능: 프롬프터 모드 -->
      <button
        class="btn-tool"
        style="background: #10b981; color: #fff"
        onclick="startPrompter()">
        📺 프롬프터
      </button>

      <div
        id="onlineCount"
        style="
          font-size: 0.75rem;
          background: #f1f5f9;
          padding: 4px 8px;
          border-radius: 12px;
        ">
        접속자: 0명
      </div>
      <button
        style="
          background: #64748b;
          color: #fff;
          border: none;
          border-radius: 6px;
          padding: 4px 8px;
          cursor: pointer;
        "
        onclick="logout()">
        로그아웃
      </button>
    </header>

    <div
      id="loginView"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        z-index: 3000;
        text-align: center;
      ">
      <h2>🔐 릴스 캔버스 접속</h2>
      <input
        type="text"
        id="username"
        placeholder="아이디"
        style="
          width: 100%;
          padding: 8px;
          margin-bottom: 10px;
          box-sizing: border-box;
        " /><br />
      <input
        type="password"
        id="password"
        placeholder="비밀번호"
        style="
          width: 100%;
          padding: 8px;
          margin-bottom: 10px;
          box-sizing: border-box;
        " /><br />
      <button
        style="
          width: 100%;
          background: var(--primary);
          color: #fff;
          padding: 10px;
          border: none;
          border-radius: 6px;
          font-weight: bold;
          cursor: pointer;
        "
        onclick="login()">
        접속하기
      </button>
    </div>

    <!-- 캔버스 메인 뷰포트 -->
    <div id="canvasViewport">
      <div id="canvasContainer">
        <svg id="connectionsSvg"></svg>
        <!-- 1번 기능 연결선 -->
        <canvas id="fabricCanvas" width="6000" height="6000"></canvas>
      </div>
    </div>

    <!-- 2번 기능: 미니맵 -->
    <div id="minimap">
      <div id="minimapViewport"></div>
    </div>

    <!-- 10번 기능: 대본 프롬프터 뷰어 -->
    <div id="prompterOverlay">
      <div
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 20px;
        ">
        <span>🎬 대본 촬영 프롬프터 모드 (스크롤 조절 가능)</span>
        <button
          style="
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
          "
          onclick="stopPrompter()">
          닫기 ✕
        </button>
      </div>
      <div id="prompterContent"></div>
    </div>

    <!-- 메모 편집 모달 (4번 이미지 첨부 기능 포함) -->
    <div id="memoModal" class="modal-bg">
      <div class="modal">
        <h3>📝 메모 노드 편집</h3>
        <input type="hidden" id="editMemoId" />
        <input type="hidden" id="isSticky" />
        <label>제목</label>
        <input
          type="text"
          id="editTitle"
          style="
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
          " />

        <!-- 4번 기능: 이미지 URL 입력 -->
        <label>🖼️ 이미지/레퍼런스 URL (선택)</label>
        <input
          type="text"
          id="editImageUrl"
          placeholder="https://..."
          style="
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
          " />

        <label>대본 및 내용</label>
        <div
          id="quillEditor"
          style="height: 120px; background: #fff; margin-bottom: 10px"></div>

        <div style="display: flex; gap: 10px; margin-top: 15px">
          <button
            style="
              flex: 1;
              background: var(--primary);
              color: #fff;
              border: none;
              padding: 8px;
              border-radius: 6px;
              font-weight: bold;
              cursor: pointer;
            "
            onclick="saveMemoModal()">
            저장하기
          </button>
          <button
            style="
              background: #666;
              color: #fff;
              border: none;
              border-radius: 6px;
              padding: 8px 15px;
              cursor: pointer;
            "
            onclick="closeModal('memoModal')">
            취소
          </button>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      let currentUser = null;
      let currentBoardId = null;
      let fCanvas = null;
      let quill = null;
      let memosCache = {};
      let connections = [];

      // 1번 기능: 줌 & 팬 상태값
      let scale = 1;
      let panX = 0,
        panY = 0;
      let isPanning = false;
      let startX, startY;

      let connectingFromId = null; // 1번 연결선 연결 대기 저장

      window.onload = () => {
        fCanvas = new fabric.Canvas("fabricCanvas", {
          isDrawingMode: false,
          selection: true,
        });
        fCanvas.freeDrawingBrush.width = 3;
        fCanvas.freeDrawingBrush.color =
          document.getElementById("penColor").value;

        fCanvas.on("path:created", function (e) {
          socket.emit("drawing:path", {
            boardId: currentBoardId,
            svgPath: e.path.toSVG(),
          });
        });

        // 1번 기능: 줌 & 팬 (Ctrl + 휠 줌, 스페이스바 / 마우스 드래그 팬)
        const viewport = document.getElementById("canvasViewport");
        viewport.addEventListener("wheel", (e) => {
          if (e.ctrlKey) {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(0.2, scale), 3);
            updateTransform();
          }
        });

        viewport.addEventListener("mousedown", (e) => {
          if (
            e.button === 1 ||
            e.spaceKey ||
            e.target.id === "canvasViewport"
          ) {
            isPanning = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
          }
        });

        window.addEventListener("mousemove", (e) => {
          if (isPanning) {
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
          }
        });

        window.addEventListener("mouseup", () => {
          isPanning = false;
        });

        init();
      };

      function updateTransform() {
        const container = document.getElementById("canvasContainer");
        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        updateMinimap();
      }

      // 2번 기능: 미니맵 업데이트
      function updateMinimap() {
        const minimapVp = document.getElementById("minimapViewport");
        const ratio = 160 / 6000;
        minimapVp.style.width = `${(window.innerWidth / scale) * ratio}px`;
        minimapVp.style.height = `${(window.innerHeight / scale) * ratio}px`;
        minimapVp.style.left = `${Math.abs(panX) * ratio}px`;
        minimapVp.style.top = `${Math.abs(panY) * ratio}px`;
      }

      function setTool(tool) {
        document
          .querySelectorAll(".btn-tool")
          .forEach((btn) => btn.classList.remove("active"));
        if (tool === "pen") {
          document.getElementById("toolPenBtn").classList.add("active");
          fCanvas.isDrawingMode = true;
        } else if (tool === "eraser") {
          document.getElementById("toolEraserBtn").classList.add("active");
          fCanvas.isDrawingMode = false;
        } else {
          document.getElementById("toolSelectBtn").classList.add("active");
          fCanvas.isDrawingMode = false;
        }
      }

      function updatePenColor() {
        if (fCanvas)
          fCanvas.freeDrawingBrush.color =
            document.getElementById("penColor").value;
      }

      async function init() {
        quill = new Quill("#quillEditor", {
          theme: "snow",
          modules: { toolbar: [["bold", "italic"]] },
        });
        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.loggedIn) {
          currentUser = data.user;
          document.getElementById("loginView").style.display = "none";
          loadBoards();
        }
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) location.reload();
        else alert(data.message);
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" });
        location.reload();
      }

      async function loadBoards() {
        const res = await fetch("/api/boards");
        const boards = await res.json();
        if (boards.length > 0) {
          currentBoardId = boards[0].id;
          socket.emit("board:join", currentBoardId);
          loadMemos();
          loadConnections();
          loadDrawings();
        }
      }

      async function loadMemos() {
        const res = await fetch(`/api/memos/${currentBoardId}`);
        const memos = await res.json();
        renderCanvas(memos);
      }

      async function loadConnections() {
        const res = await fetch(`/api/connections/${currentBoardId}`);
        connections = await res.json();
        renderConnections();
      }

      async function loadDrawings() {
        const res = await fetch(`/api/drawings/${currentBoardId}`);
        const drawings = await res.json();
        fCanvas.clear();
        drawings.forEach((d) => {
          fabric.loadSVGFromString(d.path_data, function (objects, options) {
            const obj = fabric.util.groupSVGElements(objects, options);
            fCanvas.add(obj);
            fCanvas.renderAll();
          });
        });
      }

      // 렌더링 (3, 4, 5, 6, 8번 기능 융합)
      function renderCanvas(memos) {
        memosCache = {};
        const container = document.getElementById("canvasContainer");
        const oldCards = container.querySelectorAll(".canvas-card");
        oldCards.forEach((c) => c.remove());

        memos.forEach((memo, index) => {
          memosCache[memo.id] = memo;
          const card = document.createElement("div");
          card.className = `canvas-card ${memo.category === "#포스트잇" ? "sticky-note" : ""} ${memo.is_locked ? "locked" : ""}`;
          card.id = `card-${memo.id}`;
          card.dataset.id = memo.id;

          card.style.left = `${memo.pos_x || 120 + (index % 4) * 340}px`;
          card.style.top = `${memo.pos_y || 120 + Math.floor(index / 4) * 280}px`;
          if (memo.width) card.style.width = `${memo.width}px`;
          if (memo.height) card.style.height = `${memo.height}px`;

          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span style="font-size:0.7rem; font-weight:bold;">${memo.category || "#노드"}</span>
              <div>
                <button style="font-size:0.6rem;" onclick="toggleLock('${memo.id}', ${!memo.is_locked})">${memo.is_locked ? "🔒" : "🔓"}</button>
                <button style="font-size:0.6rem;" onclick="startConnection('${memo.id}')">🔗</button>
              </div>
            </div>
            <h4 style="margin:4px 0;">${memo.title}</h4>
            ${memo.image_url ? `<img src="${memo.image_url}" style="width:100%; max-height:80px; object-fit:cover; border-radius:4px; margin-top:4px;">` : ""}
            <div class="script-box">${memo.rich_content || memo.script || ""}</div>
            <button style="font-size:0.65rem; margin-top:6px; background:#27ae60; color:#fff; border:none; padding:2px 6px; border-radius:4px; cursor:pointer;" onclick="editMemo('${memo.id}')">✏️ 편집</button>
          `;

          // 5번 기능: 크기 변경(Resize) 감지 이벤트
          new ResizeObserver(() => {
            socket.emit("memo:resize", {
              memoId: memo.id,
              boardId: currentBoardId,
              width: card.offsetWidth,
              height: card.offsetHeight,
            });
            renderConnections();
          }).observe(card);

          // 드래그 이동
          let isCardDragging = false,
            offsetLeft = 0,
            offsetTop = 0;
          card.addEventListener("mousedown", (e) => {
            if (
              memo.is_locked ||
              e.target.tagName === "BUTTON" ||
              fCanvas.isDrawingMode
            )
              return;
            isCardDragging = true;
            offsetLeft = e.clientX - card.offsetLeft;
            offsetTop = e.clientY - card.offsetTop;
          });

          window.addEventListener("mousemove", (e) => {
            if (isCardDragging) {
              const newX = e.clientX - offsetLeft;
              const newY = e.clientY - offsetTop;
              card.style.left = `${newX}px`;
              card.style.top = `${newY}px`;
              socket.emit("memo:move", {
                memoId: memo.id,
                boardId: currentBoardId,
                pos_x: newX,
                pos_y: newY,
              });
              renderConnections();
            }
          });

          window.addEventListener("mouseup", () => {
            isCardDragging = false;
          });
          container.appendChild(card);
        });

        renderConnections();
      }

      // 1번 기능: 화살표 연결선 SVG 그리기
      function renderConnections() {
        const svg = document.getElementById("connectionsSvg");
        svg.innerHTML = "";
        connections.forEach((conn) => {
          const fromEl = document.getElementById(`card-${conn.from_memo_id}`);
          const toEl = document.getElementById(`card-${conn.to_memo_id}`);
          if (fromEl && toEl) {
            const x1 = fromEl.offsetLeft + fromEl.offsetWidth / 2;
            const y1 = fromEl.offsetTop + fromEl.offsetHeight / 2;
            const x2 = toEl.offsetLeft + toEl.offsetWidth / 2;
            const y2 = toEl.offsetTop + toEl.offsetHeight / 2;

            const line = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "line",
            );
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#e1306c");
            line.setAttribute("stroke-width", "3");
            line.setAttribute("stroke-dasharray", "5,5");
            svg.appendChild(line);
          }
        });
      }

      function startConnection(memoId) {
        if (!connectingFromId) {
          connectingFromId = memoId;
          alert("연결할 대상 카드의 🔗 버튼을 눌러주세요.");
        } else {
          socket.emit("connection:create", {
            boardId: currentBoardId,
            fromId: connectingFromId,
            toId: memoId,
          });
          connectingFromId = null;
        }
      }

      // 8번 기능: 잠금 토글
      function toggleLock(memoId, is_locked) {
        socket.emit("memo:lock", {
          memoId,
          boardId: currentBoardId,
          is_locked,
        });
      }

      // 10번 기능: 프롬프터 모드 실행
      function startPrompter() {
        const text = Object.values(memosCache)
          .map((m) => `[${m.title}]\n${m.script}`)
          .join("\n\n--------------------\n\n");
        document.getElementById("prompterContent").innerText =
          text || "작성된 대본이 없습니다.";
        document.getElementById("prompterOverlay").style.display = "block";
      }
      function stopPrompter() {
        document.getElementById("prompterOverlay").style.display = "none";
      }

      function openMemoModal(type) {
        document.getElementById("editMemoId").value = "";
        document.getElementById("isSticky").value =
          type === "sticky" ? "true" : "false";
        document.getElementById("editTitle").value =
          type === "sticky" ? "📌 스티커 아이디어" : "🎬 릴스 대본";
        document.getElementById("editImageUrl").value = "";
        quill.clipboard.dangerouslyPasteHTML("<p>내용을 작성하세요...</p>");
        document.getElementById("memoModal").style.display = "flex";
      }

      function editMemo(memoId) {
        const memo = memosCache[memoId];
        if (!memo) return;
        document.getElementById("editMemoId").value = memo.id;
        document.getElementById("editTitle").value = memo.title;
        document.getElementById("editImageUrl").value = memo.image_url || "";
        quill.clipboard.dangerouslyPasteHTML(
          memo.rich_content || memo.script || "",
        );
        document.getElementById("memoModal").style.display = "flex";
      }

      function saveMemoModal() {
        const id = document.getElementById("editMemoId").value;
        const isSticky = document.getElementById("isSticky").value === "true";
        socket.emit("memo:save", {
          id: id || undefined,
          board_id: currentBoardId,
          title: document.getElementById("editTitle").value || "무제 노드",
          category: isSticky ? "#포스트잇" : "#릴스대본",
          image_url: document.getElementById("editImageUrl").value,
          rich_content: quill.root.innerHTML,
          script: quill.getText(),
          pos_x: Math.floor(Math.random() * 300) + 100,
          pos_y: Math.floor(Math.random() * 300) + 150,
          author: currentUser.name,
        });
        closeModal("memoModal");
      }

      function closeModal(id) {
        document.getElementById(id).style.display = "none";
      }

      socket.on("presence:update", (users) => {
        document.getElementById("onlineCount").innerText =
          `접속자: ${users.length}명`;
      });

      socket.on("memo:updated", () => loadMemos());
      socket.on("connection:created", (conn) => {
        connections.push(conn);
        renderConnections();
      });
      socket.on("memo:resized", () => renderConnections());
      socket.on("memo:locked", () => loadMemos());
      socket.on("drawing:path", ({ svgPath }) => {
        fabric.loadSVGFromString(svgPath, function (objects, options) {
          fCanvas.add(fabric.util.groupSVGElements(objects, options));
          fCanvas.renderAll();
        });
      });

      init();
    </script>
  </body>
</html>
