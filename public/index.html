<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🎨 피그마형 무한 릴스 대본 & 자유 그림 캔버스 Pro</title>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Quill.js 서식 에디터 -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
      :root {
        --primary: #e1306c;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --border: #e0e0e0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: #e2e8f0;
        overflow: hidden;
        touch-action: none;
      }

      header {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        padding: 6px 18px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        flex-wrap: wrap;
      }

      #canvas {
        width: 6000px;
        height: 6000px;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        position: absolute;
        top: 0;
        left: 0;
      }

      #drawCanvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        cursor: crosshair;
      }

      .canvas-card {
        position: absolute;
        width: 300px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 2px solid #cbd5e1;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 16px;
        cursor: move;
        user-select: none;
        z-index: 10;
      }

      .script-box {
        background: #f1f5f9;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        font-size: 0.85rem;
        margin-top: 8px;
        max-height: 150px;
        overflow-y: auto;
      }

      .user-cursor {
        position: absolute;
        pointer-events: none;
        font-size: 11px;
        padding: 3px 8px;
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        z-index: 9999;
        font-weight: bold;
      }

      .modal-bg {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        max-width: 580px;
      }

      input,
      button,
      select {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
      }
      button.btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }
      .draw-active {
        background: #10b981 !important;
        color: #fff !important;
      }
    </style>
  </head>
  <body>
    <header>
      <div style="font-weight: bold; color: var(--primary)">
        🎨 릴스 캔버스 Pro
      </div>

      <button
        id="drawModeBtn"
        onclick="toggleDrawMode()"
        style="background: #f1f5f9; color: #333; font-weight: bold">
        ✏️ 손그림 모드
      </button>
      <input
        type="color"
        id="penColor"
        value="#e1306c"
        style="width: 36px; height: 30px; padding: 0; cursor: pointer"
        title="펜 색상" />
      <button
        style="background: #e74c3c; color: #fff"
        onclick="clearDrawings()">
        🧹 그림 지우기
      </button>

      <button class="btn-primary" onclick="openMemoModal('hook')">
        ⚡ 3초 후킹
      </button>
      <button
        class="btn-primary"
        style="background: #3b82f6"
        onclick="openMemoModal('story')">
        📖 스토리
      </button>
      <div
        id="onlineCount"
        style="
          font-size: 0.85rem;
          background: #f1f5f9;
          padding: 4px 10px;
          border-radius: 12px;
        ">
        접속자: 0명
      </div>
      <button style="background: #64748b; color: #fff" onclick="logout()">
        로그아웃
      </button>
    </header>

    <div
      id="loginView"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        z-index: 3000;
        text-align: center;
      ">
      <h2>🔐 릴스 캔버스 접속</h2>
      <input
        type="text"
        id="username"
        placeholder="아이디"
        style="width: 100%; margin-bottom: 10px" /><br />
      <input
        type="password"
        id="password"
        placeholder="비밀번호"
        style="width: 100%; margin-bottom: 10px" /><br />
      <button class="btn-primary" style="width: 100%" onclick="login()">
        접속하기
      </button>
    </div>

    <div id="canvas">
      <canvas id="drawCanvas" width="6000" height="6000"></canvas>
    </div>

    <div id="memoModal" class="modal-bg">
      <div class="modal">
        <h3>📝 대본/아이디어 노드 편집</h3>
        <input type="hidden" id="editMemoId" />
        <label>제목</label>
        <input
          type="text"
          id="editTitle"
          style="width: 100%; margin-bottom: 10px" />
        <label>카테고리</label>
        <input
          type="text"
          id="editCategory"
          placeholder="#정보, #챌린지"
          style="width: 100%; margin-bottom: 10px" />
        <label>대본 서식 (볼드, 이탤릭, 색상 적용)</label>
        <div
          id="quillEditor"
          style="height: 150px; background: #fff; margin-bottom: 10px"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px">
          <button class="btn-primary" style="flex: 1" onclick="saveMemoModal()">
            저장하기
          </button>
          <button
            style="
              background: #666;
              color: #fff;
              border: none;
              border-radius: 6px;
              padding: 8px 15px;
              cursor: pointer;
            "
            onclick="closeModal('memoModal')">
            취소
          </button>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      let currentUser = null;
      let currentBoardId = null;
      let quill = null;
      let memosCache = {};

      let isDraggingCard = false;
      let dragTarget = null;
      let dragOffset = { x: 0, y: 0 };

      let isDrawMode = false;
      let isDrawing = false;
      let drawCanvas, ctx;
      let currentStroke = [];

      window.onload = () => {
        drawCanvas = document.getElementById("drawCanvas");
        ctx = drawCanvas.getContext("2d");

        drawCanvas.addEventListener("mousedown", startDrawing);
        drawCanvas.addEventListener("mousemove", draw);
        drawCanvas.addEventListener("mouseup", stopDrawing);

        drawCanvas.addEventListener("touchstart", (e) =>
          startDrawing(e.touches[0]),
        );
        drawCanvas.addEventListener("touchmove", (e) => draw(e.touches[0]));
        drawCanvas.addEventListener("touchend", stopDrawing);

        init();
      };

      function toggleDrawMode() {
        isDrawMode = !isDrawMode;
        const btn = document.getElementById("drawModeBtn");
        if (isDrawMode) {
          btn.classList.add("draw-active");
          btn.innerText = "✍️ 그리기 중 (클릭 시 해제)";
          drawCanvas.style.pointerEvents = "auto";
        } else {
          btn.classList.remove("draw-active");
          btn.innerText = "✏️ 손그림 모드";
          drawCanvas.style.pointerEvents = "none";
        }
      }

      function startDrawing(e) {
        if (!isDrawMode) return;
        isDrawing = true;
        currentStroke = [];
        const pos = getCanvasPos(e);
        currentStroke.push(pos);

        ctx.beginPath();
        ctx.strokeStyle = document.getElementById("penColor").value;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.moveTo(pos.x, pos.y);
      }

      function draw(e) {
        if (!isDrawing || !isDrawMode) return;
        const pos = getCanvasPos(e);
        currentStroke.push(pos);

        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
      }

      function stopDrawing() {
        if (!isDrawing) return;
        isDrawing = false;
        ctx.closePath();

        if (currentStroke.length > 1) {
          socket.emit("drawing:stroke", {
            boardId: currentBoardId,
            points: currentStroke,
            color: document.getElementById("penColor").value,
            width: 3,
          });
        }
      }

      function getCanvasPos(e) {
        const rect = drawCanvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      function renderStroke(points, color, width) {
        if (!points || points.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = color || "#e1306c";
        ctx.lineWidth = width || 3;
        ctx.lineCap = "round";
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
        ctx.closePath();
      }

      function clearDrawings() {
        if (confirm("캔버스의 모든 그림을 지우시겠습니까?")) {
          socket.emit("drawing:clear", currentBoardId);
        }
      }

      socket.on("drawing:stroke", (data) => {
        renderStroke(data.points, data.color, data.width);
      });

      socket.on("drawing:cleared", () => {
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      });

      document.addEventListener("mousemove", (e) => {
        socket.emit("cursor:move", { x: e.clientX, y: e.clientY });

        if (isDraggingCard && dragTarget) {
          const newX = e.clientX - dragOffset.x;
          const newY = e.clientY - dragOffset.y;

          dragTarget.style.left = `${newX}px`;
          dragTarget.style.top = `${newY}px`;

          socket.emit("memo:move", {
            memoId: dragTarget.dataset.id,
            boardId: currentBoardId,
            pos_x: newX,
            pos_y: newY,
          });
        }
      });

      document.addEventListener("mouseup", () => {
        isDraggingCard = false;
        dragTarget = null;
      });

      socket.on("cursor:update", (data) => {
        let cursorEl = document.getElementById(`cursor-${data.socketId}`);
        if (!cursorEl) {
          cursorEl = document.createElement("div");
          cursorEl.id = `cursor-${data.socketId}`;
          cursorEl.className = "user-cursor";
          document.body.appendChild(cursorEl);
        }
        cursorEl.innerText = `🖱️ ${data.name}`;
        cursorEl.style.left = `${data.x + 10}px`;
        cursorEl.style.top = `${data.y + 10}px`;
      });

      socket.on("cursor:remove", (socketId) => {
        const cursorEl = document.getElementById(`cursor-${socketId}`);
        if (cursorEl) cursorEl.remove();
      });

      socket.on("memo:moved", ({ memoId, pos_x, pos_y }) => {
        const card = document.getElementById(`card-${memoId}`);
        if (card) {
          card.style.left = `${pos_x}px`;
          card.style.top = `${pos_y}px`;
        }
      });

      async function init() {
        quill = new Quill("#quillEditor", {
          theme: "snow",
          modules: {
            toolbar: [
              ["bold", "italic", "underline"],
              [{ color: [] }, { background: [] }],
            ],
          },
        });

        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.loggedIn) {
          currentUser = data.user;
          document.getElementById("loginView").style.display = "none";
          loadBoards();
        }
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) location.reload();
        else alert(data.message);
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" });
        location.reload();
      }

      async function loadBoards() {
        const res = await fetch("/api/boards");
        const boards = await res.json();
        if (boards.length > 0) {
          currentBoardId = boards[0].id;
          socket.emit("board:join", currentBoardId);
          loadMemos();
          loadDrawings();
        }
      }

      async function loadMemos() {
        const res = await fetch(`/api/memos/${currentBoardId}`);
        const memos = await res.json();
        renderCanvas(memos);
      }

      async function loadDrawings() {
        const res = await fetch(`/api/drawings/${currentBoardId}`);
        const drawings = await res.json();
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        drawings.forEach((d) => {
          try {
            const points = JSON.parse(d.path_data);
            renderStroke(points, d.color, d.width);
          } catch (e) {}
        });
      }

      function renderCanvas(memos) {
        memosCache = {};
        const canvas = document.getElementById("canvas");

        const oldCards = canvas.querySelectorAll(".canvas-card");
        oldCards.forEach((c) => c.remove());

        memos.forEach((memo, index) => {
          memosCache[memo.id] = memo;
          const card = document.createElement("div");
          card.className = "canvas-card";
          card.id = `card-${memo.id}`;
          card.dataset.id = memo.id;

          const posX = memo.pos_x || 120 + (index % 4) * 350;
          const posY = memo.pos_y || 120 + Math.floor(index / 4) * 300;

          card.style.left = `${posX}px`;
          card.style.top = `${posY}px`;

          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <span style="font-size:0.75rem; background:#ffe6ed; color:var(--primary); padding:2px 6px; border-radius:4px; font-weight:bold;">${memo.category || "#아이디어"}</span>
              <span style="font-size:0.75rem; color:#888;">✍️ ${memo.author}</span>
            </div>
            <h4 style="margin:4px 0;">${memo.title}</h4>
            <div class="script-box">${memo.rich_content || memo.script || "내용 없음"}</div>

            <div style="display:flex; gap:4px; margin-top:10px;">
              <button style="font-size:0.7rem; padding:2px 6px; background:#27ae60;" onclick="editMemo('${memo.id}')">✏️ 수정</button>
              <button style="font-size:0.7rem; padding:2px 6px; background:#e74c3c;" onclick="deleteMemo('${memo.id}')">🗑️</button>
            </div>
          `;

          card.addEventListener("mousedown", (e) => {
            if (isDrawMode || e.target.tagName === "BUTTON") return;
            isDraggingCard = true;
            dragTarget = card;
            dragOffset.x = e.clientX - card.offsetLeft;
            dragOffset.y = e.clientY - card.offsetTop;
          });

          canvas.appendChild(card);
        });
      }

      function openMemoModal(type) {
        document.getElementById("editMemoId").value = "";
        document.getElementById("editTitle").value =
          type === "hook" ? "⚡ 3초 후킹 대본" : "📖 스토리텔링 대본";
        document.getElementById("editCategory").value =
          type === "hook" ? "#후킹" : "#스토리";

        const defaultText =
          type === "hook"
            ? '<p><strong style="color:rgb(225,48,108);">[3초 후킹]</strong>: 아직도 ~하시나요?</p>'
            : "<p><strong>[도입]</strong>: 완벽한 대본을 작성해보세요.</p>";

        quill.clipboard.dangerouslyPasteHTML(defaultText);
        document.getElementById("memoModal").style.display = "flex";
      }

      function editMemo(memoId) {
        const memo = memosCache[memoId];
        if (!memo) return;

        document.getElementById("editMemoId").value = memo.id;
        document.getElementById("editTitle").value = memo.title;
        document.getElementById("editCategory").value = memo.category || "";
        quill.clipboard.dangerouslyPasteHTML(
          memo.rich_content || memo.script || "",
        );
        document.getElementById("memoModal").style.display = "flex";
      }

      function saveMemoModal() {
        const id = document.getElementById("editMemoId").value;
        socket.emit("memo:save", {
          id: id || undefined,
          board_id: currentBoardId,
          title: document.getElementById("editTitle").value || "무제 노드",
          category: document.getElementById("editCategory").value || "#일반",
          rich_content: quill.root.innerHTML,
          script: quill.getText(),
          pos_x: Math.floor(Math.random() * 300) + 100,
          pos_y: Math.floor(Math.random() * 300) + 150,
          author: currentUser.name,
        });
        closeModal("memoModal");
      }

      function deleteMemo(memoId) {
        if (confirm("이 메모를 삭제하시겠습니까?")) {
          socket.emit("memo:delete", { memoId, boardId: currentBoardId });
        }
      }

      function closeModal(id) {
        document.getElementById(id).style.display = "none";
      }

      socket.on("presence:update", (users) => {
        document.getElementById("onlineCount").innerText =
          `접속자: ${users.length}명`;
      });

      socket.on("memo:updated", () => loadMemos());

      init();
    </script>
  </body>
</html>
